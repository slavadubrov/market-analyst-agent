services:
  # PostgreSQL for checkpoint persistence
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_analyst
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d market_analyst"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant for Long-Term Memory (Vector DB)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:6333/dashboard || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for alternative hot memory checkpointer
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Market Analyst Agent application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=market_analyst
      - POSTGRES_USER=analyst
      - POSTGRES_PASSWORD=analyst_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    # Override for one-shot analysis:
    # command: ["python", "-m", "market_analyst.cli", "Analyze NVDA stock"]

volumes:
  postgres_data:

  qdrant_data:

  redis_data:
